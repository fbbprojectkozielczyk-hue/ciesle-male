<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cieśle Małe</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --green:#5f7c5a;
  --beige:#f5f1e8;
  --dark:#2f3e2e;
  --bg:var(--beige);
  --text:var(--dark);
}

body.dark{
  --bg:#121212;
  --text:#f1f1f1;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

h1,h2{font-family:'Playfair Display',serif;}

nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.7);
  z-index:1000;
}

body.dark nav{
  background:rgba(20,20,20,0.8);
}

nav a{
  margin:0 10px;
  text-decoration:none;
  color:var(--text);
}

.toggle{
  cursor:pointer;
  background:var(--green);
  color:white;
  padding:6px 12px;
  border-radius:20px;
}

/* HERO */
.hero{
  height:100vh;
  background:url('images/zdjecie1.jpg') center/cover fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

.hero-content{
  position:relative;
  z-index:1;
}

.hero h1{
  font-size:4rem;
}

/* SEKCJE */
section{
  padding:80px 20px;
  max-width:1100px;
  margin:auto;
}

/* GALERIA */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  border-radius:15px;
  transition:0.3s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

#lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:10px;
}

#close{
  position:absolute;
  top:20px;
  right:40px;
  font-size:40px;
  color:white;
  cursor:pointer;
}

/* MAPA */
.map iframe{
  width:100%;
  height:350px;
  border:0;
  border-radius:15px;
}

/* ANIMACJE */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}

.fade.show{
  opacity:1;
  transform:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  background:var(--dark);
  color:white;
}
</style>
</head>

<body>

<nav>
  <div><strong>Cieśle Małe</strong></div>
  <div>
    <a href="#historia">Historia</a>
    <a href="#galeria">Galeria</a>
    <a href="#kontakt">Kontakt</a>
    <span class="toggle" onclick="toggleDark()">🌙</span>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Cieśle Małe</h1>
    <p>Spokojne miejsce z historią</p>
  </div>
</section>

<section id="historia" class="fade">
  <h2>Rys historyczny</h2>
  <p>
    Cieśle Małe to spokojna wieś w Wielkopolsce, otoczona polami i naturą.
  </p>
</section>

<section id="galeria" class="fade">
  <h2>Galeria</h2>
  <div class="gallery">
    <img src="Borowiecka 25.JPG">
    <img src="Borowiecka 32.JPG">
    <img src="Borowiecka 36.JPG">
  </div>
</section>

<section id="kontakt" class="fade">
  <h2>Lokalizacja</h2>
  <div class="map">
    <iframe src="https://www.google.com/maps?q=Cieśle%20Małe%20Polska&output=embed"></iframe>
  </div>
</section>

<footer>
  © 2026 Cieśle Małe
</footer>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="close">&times;</span>
  <img id="lightbox-img">
</div>

<script>
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark");
}

/* animacje */
const faders=document.querySelectorAll('.fade');
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('show');
    }
  });
});
faders.forEach(el=>obs.observe(el));

/* LIGHTBOX */
const images=document.querySelectorAll('.gallery img');
const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightbox-img');
const close=document.getElementById('close');

images.forEach(img=>{
  img.addEventListener('click',()=>{
    lightbox.style.display='flex';
    lightboxImg.src=img.src;
  });
});

close.addEventListener('click',()=>{
  lightbox.style.display='none';
});

lightbox.addEventListener('click',(e)=>{
  if(e.target!==lightboxImg){
    lightbox.style.display='none';
  }
});
</script>

</body>
</html>
